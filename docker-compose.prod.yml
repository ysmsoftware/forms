version: "3.9"

# ─── Replace build: with image: so VPS just pulls from GHCR ─────────────────
# Images are built by GitHub Actions and pushed to:
#   ghcr.io/ysmsoftware/forms-backend:latest
#   ghcr.io/ysmsoftware/forms-frontend:latest

x-backend-env: &backend-env
  env_file:
    - ./backend/.env.production

services:

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: smartform_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──
  backend:
    image: ghcr.io/ysmsoftware/forms-backend:latest   # ← pulled from GHCR
    container_name: smartform_backend
    restart: unless-stopped
    <<: *backend-env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3005:3005"
    volumes:
      - uploads:/app/storage
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Background Worker ──
  worker:
    image: ghcr.io/ysmsoftware/forms-backend:latest   # ← same image, different CMD
    container_name: smartform_worker
    restart: unless-stopped
    <<: *backend-env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: ["node", "dist/worker.js"]
    volumes:
      - uploads:/app/storage
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - internal

  # ── Frontend ──
  frontend:
    image: ghcr.io/ysmsoftware/forms-frontend:latest  # ← pulled from GHCR
    container_name: smartform_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - external

# ─── Volumes ──
volumes:
  redis-data:
  uploads:

# ─── Networks ──
networks:
  internal:
    driver: bridge
  external:
    driver: bridge