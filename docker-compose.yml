version: "3.9"

# ─── Shared environment for all backend containers ───────────────────────────
# Override values in backend/.env.production before deploying
x-backend-env: &backend-env
  env_file:
    - ./backend/.env.production

services:

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smartform_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartform_backend
    restart: unless-stopped
    <<: *backend-env
    environment:
      # These override .env.production so containers talk to each other
      # via Docker service names, not localhost
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3005:3005"
    volumes:
      - uploads:/app/storage        # persistent local file storage
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Background Worker ──
  # Runs the BullMQ worker process (messages, certificates, analytics)
  # Same image as backend — different CMD
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartform_worker
    restart: unless-stopped
    <<: *backend-env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: ["node", "dist/worker.js"]
    volumes:
      - uploads:/app/storage        # shared with backend — worker writes PDF files here
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy  # ensures DB is migrated before worker starts
    networks:
      - internal

  # ── Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Build-time: bake the backend URL into the Next.js bundle
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-https://api.yourdomain.com/api}"
    container_name: smartform_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - external

# ─── Volumes ──
volumes:
  redis-data:
  uploads:        # shared between backend + worker for local PDF/file storage

# ─── Networks ──
networks:
  internal:       # redis ↔ backend ↔ worker (not exposed to host)
    driver: bridge
  external:       # backend + frontend exposed to Nginx / internet
    driver: bridge
