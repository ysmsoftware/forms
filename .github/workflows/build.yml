name: Build & Push to GHCR

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.prod.yml"

env:
  REGISTRY: ghcr.io
  # e.g. ghcr.io/ysmsoftware/forms
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/forms

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build backend image and push to GHCR
  # ─────────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # needed to push to ghcr.io

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided by GitHub

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=,format=short          # e.g. a1b2c3d
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max              # GitHub Actions cache layer

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build frontend image and push to GHCR
  # NEXT_PUBLIC_API_URL is baked in at build time (Next.js requirement)
  # ─────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — SSH into VPS, pull new images, restart containers
  # Runs only after BOTH builds succeed
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            cd /var/www/forms

            # ── Pull latest docker-compose file ──────────────────────────────
            git pull origin main

            # ── Pull pre-built images ────────────
            docker compose -f docker-compose.prod.yml pull backend frontend

            # ── Zero-downtime rolling restart ────────────────────────────────
            # Redis stays untouched; only app containers cycle
            docker compose -f docker-compose.prod.yml up -d \
              --no-build \
              --remove-orphans

            # ── Run DB migrations (idempotent) ────────────────────────────────
            docker compose -f docker-compose.prod.yml exec -T backend \
              npx prisma migrate deploy

            # ── Prune dangling images to free disk space ──────────────────────
            docker image prune -f

            echo "Deploy complete — $(date)"